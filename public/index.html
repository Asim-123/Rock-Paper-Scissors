<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rock Paper Scissors — ML player</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      pre {
        background: #1118270d;
        padding: 1rem;
        overflow: auto;
        border-radius: 0.5rem;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      .err {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <p>
      freeCodeCamp-style <code>player</code> vs Quincy, Abbey, Kris, and Mrugesh.
      Deployed on Vercel with a Python API route.
    </p>
    <p>
      <button type="button" id="run">Run benchmark</button>
      <span id="status"></span>
    </p>
    <pre id="out">Click “Run benchmark” to call <code>/api/stats</code>.</pre>
    <p>
      Local tests: <code>python -m unittest test_module -v</code>
    </p>
    <script>
      const out = document.getElementById("out");
      const status = document.getElementById("status");
      document.getElementById("run").onclick = async () => {
        status.textContent = "Loading…";
        out.textContent = "";
        try {
          const r = await fetch("/api/stats");
          const data = await r.json();
          if (!data.ok) {
            out.innerHTML = '<span class="err">' + (data.error || "Error") + "</span>";
          } else {
            out.textContent = JSON.stringify(data, null, 2);
          }
        } catch (e) {
          out.innerHTML = '<span class="err">' + e.message + "</span>";
        }
        status.textContent = "";
      };
    </script>
  </body>
</html>
